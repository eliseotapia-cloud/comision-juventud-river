const HAS_SB  = Boolean(window.SUPABASE_URL && window.SUPABASE_KEY);
const sbClient = HAS_SB ? supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY) : null;
const LS_KEY  = 'cj_river_v2';

async function dbLoad() {
  if (HAS_SB) {
    const [{ data: evs }, { data: ns }] = await Promise.all([
      sbClient.from('events').select('*').order('date', { ascending: true }).order('time', { ascending: true }),
      sbClient.from('event_notes').select('*'),
    ]);
    const notes = {};
    (ns || []).forEach(n => { notes[n.event_id] = { id: n.id, content: n.content }; });
    return { events: evs || [], notes };
  }
  const saved = localStorage.getItem(LS_KEY);
  return saved ? JSON.parse(saved) : { events: DEFAULT_EVENTS, notes: {} };
}

function lsSave(events, notes) {
  if (!HAS_SB) localStorage.setItem(LS_KEY, JSON.stringify({ events, notes }));
}

async function dbAddEvent(payload) {
  if (HAS_SB) {
    const { data, error } = await sbClient.from('events').insert([payload]).select().single();
    if (error) throw error;
    return data;
  }
  return { ...payload, id: `ev_${Date.now()}`, created_at: new Date().toISOString() };
}

async function dbRemoveEvent(id) {
  if (HAS_SB) {
    const { error } = await sbClient.from('events').delete().eq('id', id);
    if (error) throw error;
  }
}

async function dbSaveNote(eventId, content, existing) {
  if (HAS_SB) {
    if (existing?.id) {
      const { error } = await sbClient.from('event_notes').update({ content, updated_at: new Date().toISOString() }).eq('id', existing.id);
      if (error) throw error;
    } else {
      const { error } = await sbClient.from('event_notes').insert([{ event_id: eventId, content }]);
      if (error) throw error;
    }
  }
}

function EventModal({ day, month, year, events, onClose, onAdd, onRemove }) {

  const [saving, setSaving]     = useState(false);
  const [form, setForm]         = useState({ title: '', time: '18:00', area: 'formativa', location: '', desc: '' });
  const dk  = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  const evs = events.filter(e => e.date === dk);

  const handleAdd = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    try {
      await onAdd({ date: dk, title: form.title.trim(), time: form.time, area: form.area, location: form.location.trim() || null, description: form.desc.trim() || null });
      setForm({ title: '', time: '18:00', area: 'formativa', location: '', desc: '' });
      setShowForm(false);
    } finally { setSaving(false); }

  return (

// ═══ CALENDARIO ═══
function Cal({ events, addEvent, removeEvent }) {
  const today = new Date();
  const [vy, setVy]         = useState(today.getFullYear());
  const [vm, setVm]         = useState(today.getMonth());
  const [sel, setSel]       = useState(null);
  const [filter, setFilter] = useState('todas');
  const [mob, setMob]       = useState(window.innerWidth < 640);
  useEffect(() => { const h = () => setMob(window.innerWidth < 640); window.addEventListener('resize', h); return () => window.removeEventListener('resize', h); }, []);

  const pm = () => { if (vm === 0) { setVm(11); setVy(y => y - 1); } else setVm(m => m - 1); };
  const nm = () => { if (vm === 11) { setVm(0); setVy(y => y + 1); } else setVm(m => m + 1); };
  const isCurrentMonth = vy === today.getFullYear() && vm === today.getMonth();

  const fd = new Date(vy, vm, 1);
  let offset = fd.getDay() - 1; if (offset < 0) offset = 6;
  const dim = new Date(vy, vm + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);

  const dk = (d) => `${vy}-${String(vm + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  const fe = filter === 'todas' ? events : events.filter(e => e.area === filter);
  const evOnDay = (d) => fe.filter(e => e.date === dk(d));
  const isToday = (d) => d === today.getDate() && vm === today.getMonth() && vy === today.getFullYear();

  return (
    <section id="calendario" style={{ padding: '40px 0 50px', display: 'flex', flexDirection: 'column', alignItems: 'center', background: C.dark3 }}>
      <div style={{ padding: '0 16px', width: '100%', maxWidth: 1200, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: '0.58rem', fontWeight: 600, letterSpacing: 5, textTransform: 'uppercase', color: C.grayMid, marginBottom: 6 }}>Charlas & Eventos</div>
        <h2 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 'clamp(1.4rem,5vw,2.1rem)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 3, color: C.white, margin: '0 0 8px', textAlign: 'center' }}>Calen<span style={{ color: C.red }}>dario</span></h2>
        <DS h={3} mb={16} />
        <div style={{ display: 'flex', gap: 5, marginBottom: 14, flexWrap: 'wrap', justifyContent: 'center' }}>
          <button onClick={() => setFilter('todas')} style={{ background: filter === 'todas' ? C.white : 'transparent', color: filter === 'todas' ? C.dark : 'rgba(255,255,255,0.55)', border: `1px solid ${filter === 'todas' ? C.white : 'rgba(255,255,255,0.15)'}`, padding: '5px 14px', borderRadius: 14, cursor: 'pointer', fontFamily: "'Oswald', sans-serif", fontSize: '0.66rem', fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase' }}>Todas</button>
          {AREAS.map(a => (
            <button key={a.id} onClick={() => setFilter(a.id)} style={{ background: filter === a.id ? a.color : 'transparent', color: filter === a.id ? C.white : a.color, border: `1px solid ${filter === a.id ? a.color : a.color + '55'}`, padding: '5px 14px', borderRadius: 14, cursor: 'pointer', fontFamily: "'Oswald', sans-serif", fontSize: '0.66rem', fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase' }}>{a.name}</button>
          ))}
        </div>
        <div style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <button onClick={pm} style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8, width: 38, height: 38, cursor: 'pointer', fontSize: '1.1rem', color: C.white, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>‹</button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 'clamp(0.95rem,3.5vw,1.3rem)', fontWeight: 700, letterSpacing: 3, textTransform: 'uppercase', color: C.white }}>{MONTHS[vm]} <span style={{ color: C.red }}>{vy}</span></div>
            {!isCurrentMonth && (
              <button onClick={() => { setVy(today.getFullYear()); setVm(today.getMonth()); }} style={{ background: `rgba(211,32,39,0.15)`, color: C.red, border: `1px solid ${C.red}44`, borderRadius: 6, padding: '3px 10px', cursor: 'pointer', fontFamily: "'Oswald', sans-serif", fontSize: '0.6rem', fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase' }}>Hoy</button>
            )}
          </div>
          <button onClick={nm} style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8, width: 38, height: 38, cursor: 'pointer', fontSize: '1.1rem', color: C.white, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>›</button>
        </div>
      </div>
      <div style={{ width: '100%', maxWidth: 1200, padding: '0 4px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: mob ? 1 : 2, marginBottom: 2, padding: '0 4px' }}>
          {(mob ? DAYS_S : DAYS_F).map(d => (
            <div key={d} style={{ textAlign: 'center', fontFamily: "'Oswald', sans-serif", fontSize: mob ? '0.62rem' : '0.72rem', fontWeight: 700, letterSpacing: 1, color: 'rgba(255,255,255,0.3)', textTransform: 'uppercase', padding: '5px 0' }}>{d}</div>
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: mob ? 1 : 2, padding: '0 4px' }}>
          {cells.map((day, idx) => {
            if (day === null) return <div key={`e${idx}`} style={{ background: 'rgba(255,255,255,0.015)', borderRadius: mob ? 4 : 7, minHeight: mob ? 50 : 100 }} />;
            const devs   = evOnDay(day);
            const today_ = isToday(day);
            return (
              <button key={idx} onClick={() => setSel(day)} style={{ background: today_ ? `rgba(211,32,39,0.12)` : 'rgba(255,255,255,0.03)', border: today_ ? `2px solid ${C.red}` : '1px solid rgba(255,255,255,0.06)', borderRadius: mob ? 5 : 8, padding: mob ? '3px 2px' : '5px 6px', cursor: 'pointer', minHeight: mob ? 50 : 100, display: 'flex', flexDirection: 'column', alignItems: 'stretch', textAlign: 'left' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 2 }}>
                  <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: mob ? '0.75rem' : '0.95rem', fontWeight: today_ ? 800 : 600, color: today_ ? C.red : 'rgba(255,255,255,0.75)' }}>{day}</span>
                  {devs.length > 0 && <span style={{ fontSize: '0.48rem', fontWeight: 700, color: C.red }}>{devs.length}</span>}
                </div>
                {mob ? (
                  <div style={{ display: 'flex', gap: 2, flexWrap: 'wrap', marginTop: 1 }}>
                    {devs.slice(0, 4).map(ev => <div key={ev.id} style={{ width: 6, height: 6, borderRadius: '50%', background: areaColor(ev.area) }} />)}
                  </div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 2, flex: 1, overflow: 'hidden' }}>
                    {devs.slice(0, 3).map(ev => (
                      <div key={ev.id} style={{ background: areaColor(ev.area) + '22', borderLeft: `2px solid ${areaColor(ev.area)}`, borderRadius: 3, padding: '1px 4px', fontSize: '0.57rem', fontWeight: 600, color: 'rgba(255,255,255,0.78)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ev.title}</div>
                    ))}
                    {devs.length > 3 && <div style={{ fontSize: '0.46rem', color: C.grayText, fontWeight: 600, paddingLeft: 3 }}>+{devs.length - 3}</div>}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>
      {sel !== null && (
        <EventModal day={sel} month={vm} year={vy} events={fe} onClose={() => setSel(null)} onAdd={async (p) => { await addEvent(p); }} onRemove={async (id) => { await removeEvent(id); }} />
      )}
    </section>
  );
}

// ═══ EDITOR DE NOTAS ═══
function NE({ eventId, note, onSave }) {
  const [ed, setEd]     = useState(false);
  const [draft, setDr]  = useState(note?.content ?? '');
  const [saving, setSv] = useState(false);
  const doSave = async () => { setSv(true); try { await onSave(eventId, draft); setEd(false); } finally { setSv(false); } };
  if (ed) return (
    <div>
      <textarea value={draft} onChange={e => setDr(e.target.value)} placeholder="¿Qué aprendimos?" rows={3} style={{ width: '100%', background: C.gray, border: '1px solid #ddd', borderRadius: 8, padding: '10px 12px', fontFamily: "'Montserrat', sans-serif", fontSize: '16px', color: C.dark, outline: 'none', resize: 'vertical', lineHeight: 1.6 }} autoFocus />
      <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
        <button onClick={doSave} disabled={saving} style={{ background: saving ? '#aaa' : C.red, color: C.white, border: 'none', borderRadius: 6, padding: '7px 16px', cursor: saving ? 'wait' : 'pointer', fontFamily: "'Oswald', sans-serif", fontSize: '0.68rem', fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase' }}>{saving ? '...' : 'Guardar'}</button>
        <button onClick={() => setEd(false)} style={{ background: C.gray, color: C.dark, border: '1px solid #ddd', borderRadius: 6, padding: '7px 14px', cursor: 'pointer', fontFamily: "'Oswald', sans-serif", fontSize: '0.68rem', fontWeight: 600 }}>Cancelar</button>
      </div>
    </div>
  );
  return (
    <div onClick={() => { setDr(note?.content ?? ''); setEd(true); }} style={{ cursor: 'pointer' }}>
      {note?.content
        ? <div style={{ fontSize: '0.75rem', color: C.dark, lineHeight: 1.65, opacity: 0.8, background: C.gray, borderRadius: 8, padding: '9px 12px' }}>{note.content}<div style={{ fontSize: '0.6rem', color: C.grayText, marginTop: 4, fontStyle: 'italic' }}>Tocá para editar</div></div>
        : <div style={{ fontSize: '0.72rem', color: C.grayText, fontStyle: 'italic', background: C.gray, borderRadius: 8, padding: '9px 12px', border: '1px dashed #ddd' }}>Tocá para agregar notas...</div>
      }
    </div>
  );
}

// ═══ APP ═══
function App() {
  const [page,    setPage]    = useState('inicio');
  const [events,  setEvents]  = useState([]);
  const [notes,   setNotes]   = useState({});
  const [loading, setLoading] = useState(true);
  const [msg,     setMsg]     = useState('');
  const [synced,  setSynced]  = useState(false);

  const reload = useCallback(() => {
    return dbLoad().then(({ events: evs, notes: ns }) => {
      setEvents(evs);
      setNotes(ns);
      setSynced(HAS_SB);
    });
  }, []);

  // Carga inicial
  useEffect(() => {
    reload().finally(() => setLoading(false));

    // Realtime (solo si Supabase está configurado)
    if (HAS_SB) {
      const ch = sbClient.channel('cj-realtime')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'events' },      reload)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'event_notes' }, reload)
        .subscribe();
      return () => sbClient.removeChannel(ch);
    }
  }, [reload]);

  const addEvent = async (payload) => {
    try {
      const newEv = await dbAddEvent(payload);
      const updated = [...events, newEv];
      setEvents(updated);
      lsSave(updated, notes);
    } catch(err) {
      console.error('addEvent error:', err);
      // fallback: guardar igual en estado local
      const newEv = { ...payload, id: `ev_${Date.now()}` };
      const updated = [...events, newEv];
      setEvents(updated);
      lsSave(updated, notes);
      setMsg('Guardado localmente. Subí a GitHub para sincronizar con todos.');
      setTimeout(() => setMsg(''), 5000);
    }
  };

  const removeEvent = async (id) => {
    try { await dbRemoveEvent(id); } catch(err) { console.error('removeEvent error:', err); }
    const updated = events.filter(e => e.id !== id);
    setEvents(updated);
    lsSave(updated, notes);
  };

  const saveNote = async (eventId, content) => {
    try { await dbSaveNote(eventId, content, notes[eventId]); } catch(err) { console.error('saveNote error:', err); }
    const updatedNotes = { ...notes, [eventId]: { content } };
    setNotes(updatedNotes);
    lsSave(events, updatedNotes);
  };

  const scrollTo = (id) => {
    setPage(id);
    if (id !== 'inicio') setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }), 80);
    else window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const share = async () => {
    const url = window.location.href;
    try {
      if (navigator.share) await navigator.share({ title: 'Comisión de la Juventud - River', url });
      else { await navigator.clipboard.writeText(url); setMsg('Link copiado!'); setTimeout(() => setMsg(''), 3000); }
    } catch { try { await navigator.clipboard.writeText(url); setMsg('Link copiado!'); setTimeout(() => setMsg(''), 3000); } catch { prompt('Copiá:', url); } }
  };

  if (loading) return (
    <div style={{ minHeight: '100vh', background: C.dark3, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
      <div style={{ width: 52, height: 52, borderRadius: '50%', background: C.red, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Oswald', sans-serif", fontWeight: 800, fontSize: '1.1rem', color: C.white, boxShadow: `0 4px 24px ${C.red}55` }}>CJ</div>
      <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)', letterSpacing: 3, textTransform: 'uppercase' }}>Cargando...</div>
    </div>
  );

  return (
    <div style={{ fontFamily: "'Montserrat', sans-serif", background: C.dark3, minHeight: '100vh' }}>
      <Nav active={page} onNav={scrollTo} synced={synced} />
      <Hero onNav={scrollTo} />
      <Inst />
      <Cal events={events} addEvent={addEvent} removeEvent={removeEvent} />
      <Areas events={events} notes={notes} saveNote={saveNote} />
      <Footer onShare={share} />
      {msg && <div style={{ position: 'fixed', bottom: 22, left: '50%', transform: 'translateX(-50%)', background: C.dark, color: C.white, padding: '11px 22px', borderRadius: 10, fontSize: '0.78rem', fontWeight: 600, zIndex: 300, boxShadow: '0 4px 18px rgba(0,0,0,0.4)', border: `1px solid ${C.red}44`, whiteSpace: 'nowrap' }}>{msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
